services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: launch_game
      POSTGRES_USER: launch_game
      POSTGRES_PASSWORD: launch_game
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launch_game -d launch_game"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql://launch_game:launch_game@db:5432/launch_game
    ports:
      - "3000:3000"

volumes:
  pgdata:
