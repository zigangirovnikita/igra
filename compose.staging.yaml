services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env.staging
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
  app:
    build: .
    restart: unless-stopped
    env_file: .env.staging
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: ["sh", "-c", "node node_modules/prisma/build/index.js migrate deploy && pnpm run start"]
volumes:
  staging_pgdata:
