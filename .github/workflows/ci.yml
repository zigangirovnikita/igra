name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/game-flow-v2
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: launch_game
          POSTGRES_PASSWORD: launch_game
          POSTGRES_DB: launch_game
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://launch_game:launch_game@localhost:5432/launch_game
      SESSION_SECRET: ci-session-secret-at-least-32-bytes
      LEAD_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      LEAD_WEBHOOK_URL: https://example.invalid/lead
      LEAD_WEBHOOK_SECRET: ci-webhook-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run unit and integration tests
        run: pnpm test

      - name: Validate config
        run: pnpm validate:config

      - name: Validate DB schema
        run: pnpm db:validate

      - name: Test DB migrations
        run: pnpm db:migrate:test

      - name: Deploy DB migrations
        run: pnpm exec prisma migrate deploy

      - name: Build Next.js
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Run release balance simulation
        run: pnpm simulate:balance:release
